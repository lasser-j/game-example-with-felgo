name: GameController Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'

      - name: Configure
        run: cmake -S . -B build -DBUILD_GAME=OFF -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --target test_gamecontroller

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
